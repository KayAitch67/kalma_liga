<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0f0f1a"/>
  <title>Liga</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0d0d12;
      --surface:  #1d1d23;
      --surface2: #14141a;
      --accent:   #e99e3d; /* New orange color */
      --accent2:  #4a9947; /* New green for Group A */
      --accent3:  #3d9e8c; /* New teal for Group B */
      --text:     #f0f0f0;
      --muted:    #a0a0b0;
      --border:   #2a2a35;
      --win:      #2ecc71;
      --draw:     #f39c12;
      --loss:     #e74c3c;
      --r:        12px;
      --fh:       'Barlow Condensed', sans-serif;
      --fb:       'Barlow', sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--fb);
      background:var(--bg);color:var(--text);
      max-width:480px;margin:0 auto;
      min-height:100vh;display:flex;flex-direction:column;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      background: var(--surface2);
      padding: 12px 16px 12px;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header-top-ui {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 24px;
    }
    .logo-container { display: flex; align-items: flex-start; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; flex-shrink: 0; fill: var(--text); }
    .logo-title-wrap { display: flex; flex-direction: column; line-height: 1.1; font-weight: 800; }
    .logo-kalma { font-family: var(--fh); font-size: 20px; text-transform: uppercase; letter-spacing: 2.5px; }
    .logo-liga { font-family: var(--fh); font-size: 24px; text-transform: uppercase; color: var(--text); letter-spacing: 2.5px; margin-top: -3px; }
    .progress-wrap { display: flex; flex-direction: column; align-items: center; }
    .progress-circle { position: relative; width: 42px; height: 42px; }
    .progress-circle svg { transform: rotate(-90deg); }
    .progress-circle circle { fill: none; stroke-width: 4; }
    .progress-circle-bg { stroke: #2a2a2f; }
    .progress-circle-val { stroke: var(--accent); stroke-dasharray: 100 100; stroke-linecap: round; }
    .progress-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; line-height: 1.1; font-family: var(--fh); font-size: 11px; font-weight: 600; text-transform: uppercase; color: #777788; }
    .progress-num { color: var(--text); font-size: 13px; margin-top: -1px; }

    .segmented-tabs {
      display: flex; gap: 12px;
      margin-bottom: 18px; justify-content: center;
    }
    .segmented-tab {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 18px 10px;
      font-family: var(--fh); font-size: 13px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted); cursor:pointer;
      background: rgba(255,255,255,0.02);
      border-radius: 20px;
      transition: all .2s ease-in-out;
      line-height: 1;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .segmented-tab.active { background: var(--accent); color: #000; }
    .segmented-tab.group-a { color: var(--accent2); background: rgba(74,153,71,0.05); }
    .segmented-tab.group-a.active { color: #fff; background: var(--accent2); }
    .segmented-tab.group-b { color: var(--accent3); background: rgba(61,158,140,0.05); }
    .segmented-tab.group-b.active { color: #fff; background: var(--accent3); }

    .dropdown-wrap { display: flex; justify-content: center; width: 100%; position: relative; margin-bottom: 24px; }
    .dropdown {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px 12px;
      background: var(--surface2); border: 1px solid rgba(255,255,255,0.03); border-radius: 20px;
      font-family: var(--fb); font-size: 13px; text-transform: uppercase; color: var(--text); cursor:pointer;
      letter-spacing: 1px;
    }
    .dropdown-caret { font-size: 11px; color: var(--muted); }

    /* MAIN */
    main{flex:1;overflow-y:auto;padding:2px 12px 12px; position: relative;}
    /* Subtle background graphic behind main content */
    main::before {
      content:''; position: absolute; top: -110px; left: -5%; width: 110%; height: 260px;
      background-image: repeating-linear-gradient(135deg, transparent, transparent 10px, rgba(233, 158, 61, 0.04) 10px, rgba(233, 158, 61, 0.04) 20px);
      z-index: -1; transform: rotate(10deg);
    }
    .page{display:none;}
    .page.active{display:block;}

    /* SECTION */
    .section{margin-bottom:24px;}
    .section-title {
      font-family: var(--fh); font-size: 18px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .badge {
      background: rgba(255,255,255,0.1); color: var(--text);
      font-family: var(--fb); font-size: 11px; padding: 2px 7px 3px; border-radius: 12px; font-weight: 700;
      line-height: 1;
    }

    /* MATCH CARD */
    .match-card {
      background: var(--surface2); border-radius: var(--r);
      padding: 16px 16px 18px; margin-bottom: 12px;
      position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.02);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .match-card-glow {
        position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.06), transparent 95%);
    }
    .match-top-row { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 16px;}
    .match-id-badge, .match-group-badge {
      font-family: var(--fh); font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted);
      line-height: 1; position: absolute; top: 0; padding: 5px 12px;
      background: rgba(255,255,255,0.02);
    }
    .match-id-badge { left: 0; border-bottom-right-radius: 8px; font-family: var(--fb); letter-spacing: 0.5px; color: rgba(255,255,255,0.6);}
    .match-group-badge { right: 0; border-bottom-left-radius: 8px; color: var(--accent2); background: rgba(74,153,71,0.03); font-weight: 800; letter-spacing: 1px; }

    .match-main-content { display: flex; align-items: center; justify-content: center; gap: 10px; padding-top: 10px; }
    .team-block {
      flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center;
      color: var(--text); font-family: var(--fb); font-size: 14px; font-weight: 600; text-transform: uppercase;
      line-height: 1.15; letter-spacing: 1px;
    }
    .score-block-new {
      width: 100px; padding: 10px 10px 11px;
      display: flex; flex-direction: column; align-items: center;
      background: #101015; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03);
    }
    .score-label-top { font-family: var(--fh); font-size: 9px; font-weight: 600; text-transform: uppercase; color: #777788; letter-spacing: 1px; margin-bottom: 2px;}
    .score-num-new { font-family: var(--fh); font-size: 20px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .score-colon { color: #555566; font-size: 16px; margin: 0 4px; }
    .score-num-val { color: var(--text); }
    .score-box-empty { display: flex; align-items: center; justify-content: center; font-family: var(--fh); font-size: 18px; font-weight: 800; color: #555566; line-height: 1; }

    /* STANDINGS - Kept basic for other tabs but color updated */
    .standings-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
    .standings-table{width:100%;border-collapse:collapse;font-size:13px;}
    .standings-table th{
      font-family:var(--fh);font-size:11px;letter-spacing:1px;
      text-transform:uppercase;color:var(--muted);
      padding:8px 6px;text-align:center;
      background:var(--surface2);border-bottom:1px solid var(--border);
    }
    .standings-table td{
      padding:10px 6px;text-align:center;
      border-bottom:1px solid var(--border);background:var(--surface);
    }
    .standings-table tr.playoff-row td{background:rgba(78,154,241,0.08);}
    .standings-table tr.noplf-row td{background:rgba(231,76,60,0.06);}
    .pts-cell{font-weight:800;color:var(--accent);}

    /* FOOTER NAV */
    footer {
      display: flex; position: fixed; bottom: 12px; left: 12px; right: 12px;
      height: 60px;
      background: var(--surface2); border: 1px solid rgba(255,255,255,0.03);
      border-radius: 30px; z-index: 101;
      padding: 0 10px; align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    .footer-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--muted); cursor:pointer; gap: 4px;
      position: relative; line-height: 1;
    }
    .footer-tab.active { color: var(--accent); }
    .footer-tab-icon { font-size: 18px; }
    .footer-tab-label { font-family: var(--fh); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}
    .footer-sep { width: 1px; height: 36px; background: rgba(255,255,255,0.03); flex-shrink: 0; }

    /* LOADER */
    .loader{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--muted); gap:14px;}
    .spinner{ width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;color:var(--muted);padding:30px;font-size:14px;}
  </style>
</head>
<body>

<main id="main-content">

  <div style="font-size: 14px; text-transform: uppercase; font-family: 'Barlow', sans-serif; font-weight: 600; color: #fff; margin-bottom: 12px; margin-left: 4px;">1. podstránka</div>

  <div class="header-top-wrapper" style="position: relative; background: transparent; z-index: 2; margin-bottom: 24px;">
    <header style="background: transparent; border-bottom: none; position: static; padding: 0 0 12px;">
      <div class="header-top-ui">
        <div class="logo-container">
          <svg class="logo-icon" viewBox="0 0 100 100"><path d="M50 10 L80 40 L70 90 L30 90 L20 40 Z"></path><path d="M50 20 L75 45 L67.5 85 L32.5 85 L25 45 Z" fill="#e99e3d"></path></svg>
          <div class="logo-title-wrap">
            <span class="logo-kalma">KALMA</span>
            <span class="logo-liga">LIGA</span>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-circle">
            <svg viewBox="0 0 42 42">
              <circle class="progress-circle-bg" cx="21" cy="21" r="19"></circle>
              <circle class="progress-circle-val" cx="21" cy="21" r="19" stroke-dasharray="12 100"></circle>
            </svg>
            <div class="progress-label">
              <span class="progress-title">PROGRES</span>

            </div>
          </div>
        </div>
      </div>

      <div class="segmented-tabs" id="skupinaChips">
        <div class="segmented-tab active" onclick="setSkupina('',this)">VŠETKY</div>
        <div class="segmented-tab group-a" onclick="setSkupina('A',this)">SKUPINA A</div>
        <div class="segmented-tab group-b" onclick="setSkupina('B',this)">SKUPINA B</div>
      </div>

      <div class="dropdown-wrap">
          <select class="dropdown" id="timFilter" onchange="renderZapasy()">
              <option value="">VŠETKY TÍMY</option>
          </select>
          <div style="position: absolute; top: 12px; right: 16px; font-size: 11px; color: #777; pointer-events: none;">▼</div>
      </div>
    </header>
  </div>

  <div class="page active" id="page-zapasy" style="z-index: 1;">
    <div id="zapasy-content">
      <div class="loader"><div class="spinner"></div>Načítavam…</div>
    </div>
  </div>

  <div class="page" id="page-tabulka">
    <div id="tabulka-content"></div>
  </div>

  <div class="page" id="page-playoff">
    <div class="empty">Tu sa zobrazí pavúk play-off.</div>
  </div>

  <div class="page" id="page-vykony">
    <div id="vykony-content">
        <div class="empty">Zoznam výkonov.</div>
    </div>
  </div>

</main>

<footer id="footer-nav">
  <div class="footer-tab active" onclick="showPage('zapasy',this)">
    <div class="footer-tab-icon">⚽</div>
    <span class="footer-tab-label">ZÁPASY</span>
  </div>
  <div class="footer-sep"></div>
  <div class="footer-tab" onclick="showPage('tabulka',this)">
    <div class="footer-tab-icon">🏆</div>
    <span class="footer-tab-label">PORADIE</span>
  </div>
  <div class="footer-sep"></div>
  <div class="footer-tab" onclick="showPage('playoff',this)">
    <div class="footer-tab-icon">🏆</div>
    <span class="footer-tab-label">PLAY-OFF</span>
  </div>
  <div class="footer-sep"></div>
  <div class="footer-tab" onclick="showPage('vykony',this)">
    <div class="footer-tab-icon">📊</div>
    <span class="footer-tab-label">VÝKONY</span>
  </div>
</footer>

<script>
// ═══════════════════════════════════════
//  KONFIGURÁCIA (Google Sheets CSV links)
// ═══════════════════════════════════════
const CSV_URLS = {
  tymy:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=0&single=true&output=csv',
  zapasy: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=441403134&single=true&output=csv',
  hraci:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=1788671607&single=true&output=csv',
};
const PLAYOFF_SPOTS = 4;

// ═══════════════════════════════════════
//  STAV
// ═══════════════════════════════════════
let DATA = { tymy:[], zapasy:[], hraci:[] };
let activeSkupina = '';

// ═══════════════════════════════════════
//  CSV PARSING (ÚPRAVA HLAVIČIEK)
// ═══════════════════════════════════════
function parseLine(line) {
  const vals=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){vals.push(cur);cur='';}
    else{cur+=ch;}
  }
  vals.push(cur);
  return vals.map(v=>v.trim().replace(/^"|"$/g,''));
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return [];
  
  // Normalizácia hlavičiek (odstráni diakritiku, malé písmená)
  const headers = parseLine(lines[0]).map(h => {
    return h.toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "") 
            .trim()
            .replace(/\s+/g, '_');
  });

  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] ?? '');
    return obj;
  }).filter(row => Object.values(row).some(v => v !== ''));
}

// ═══════════════════════════════════════
//  FETCH + CORS FALLBACK
// ═══════════════════════════════════════
async function fetchCSV(url) {
  const isGithubPages = window.location.hostname.includes('github.io');
  let finalUrl = url;
  if(isGithubPages){
    // Optional: add a proxy if direct fetch fails on github pages due to CORS, but try direct first
    // finalUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
  }

  try {
    const res = await fetch(finalUrl, {cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if(text.trim().startsWith('<')) throw new Error('Vrátilo HTML – nie CSV');
    return parseCSV(text);
  } catch(_) {}

  const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
  const res2 = await fetch(proxy, {cache:'no-store'});
  if(!res2.ok) throw new Error(`Proxy zlyhala (HTTP ${res2.status})`);
  const text2 = await res2.text();
  if(text2.trim().startsWith('<')) throw new Error('Proxy vrátila HTML – skontroluj publikovanie Sheets');
  return parseCSV(text2);
}

// ═══════════════════════════════════════
//  LOAD ALL
// ═══════════════════════════════════════
async function loadAll() {
  try {
    const [tymy, zapasy, hraci] = await Promise.all([
      fetchCSV(CSV_URLS.tymy),
      fetchCSV(CSV_URLS.zapasy),
      fetchCSV(CSV_URLS.hraci),
    ]);
    DATA = {tymy, zapasy, hraci};
    // Redesigned: chips are already in html, just use them for logic
    // buildSkupinaChips();
    buildTimFilter();
    // buildPlayerSelect(); // Not used in this tab-focused redesign
    renderZapasy();
    // renderTabulka(); // Placeholder call
  } catch(err) {
    const msg = `<div class="error-box" style="background:#2a0a0a; border:1px solid var(--loss); border-radius:var(--r); padding:16px; font-size:13px; color:#ff9999; line-height:1.6; z-index:2; position:relative;">
      ❌ <strong>Chyba pri načítaní dát</strong><br><br>
      ${err.message}<br><br>
      <strong>Skontroluj Google Sheet:</strong><br>
      • Súbor → Zdieľať → Publikovať na webe → každú záložku zvlášť ako CSV<br>
    </div>`;
    document.getElementById('zapasy-content').innerHTML = msg;
  }
}

// ═══════════════════════════════════════
//  SKUPINA CHIPS Logic
// ═══════════════════════════════════════
function setSkupina(s, el) {
  activeSkupina = s;
  document.querySelectorAll('#skupinaChips .segmented-tab').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  buildTimFilter();
  renderZapasy();
}

// ═══════════════════════════════════════
//  TÍM FILTER Logic
// ═══════════════════════════════════════
function buildTimFilter() {
  const sel = document.getElementById('timFilter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">VŠETKY TÍMY</option>';
  const tymy = activeSkupina ? DATA.tymy.filter(t=>t.skupina===activeSkupina) : DATA.tymy;
  // Use unique teams from matches if possible for better context
  const teamsInZapasy = DATA.zapasy.filter(z => !activeSkupina || z.skupina === activeSkupina)
                                     .flatMap(z => [z.domaci, z.host]);
  const uniqueTeams = [...new Set(teamsInZapasy)].sort();

  uniqueTeams.forEach(tName => {
    if(!tName) return;
    const o = document.createElement('option');
    o.value = tName; o.textContent = tName.toUpperCase();
    sel.appendChild(o);
  });
  if([...sel.options].some(o=>o.value===prev)) sel.value = prev;
}

// ═══════════════════════════════════════
//  RENDER – ZÁPASY (MATCH CARD REDESIGN)
// ═══════════════════════════════════════
function matchCard(z, isUpcoming) {
  const grpColor = z.skupina === 'B' ? 'var(--accent3)' : 'var(--accent2)';
  const scoreBoxContent = isUpcoming 
    ? `<div class="score-box-empty">:</div>`
    : `<div class="score-num-new"><span class="score-num-val">${z.goly_domaci}</span><span class="score-colon">:</span><span class="score-num-val">${z.goly_host}</span></div>`;

  return `<div class="match-card">
    <div class="match-card-glow"></div>
    <div class="match-top-row">
      <span class="match-id-badge">Zápas #${z.id || '?'}</span>
      <span class="match-group-badge" style="color: ${grpColor};">Skupina ${z.skupina}</span>
    </div>
    <div class="match-main-content">
      <div class="team-block team-home">${z.domaci}</div>
      <div class="score-block-new">
        <span class="score-label-top">VÝSLEDNÉ SKÓRE</span>
        ${scoreBoxContent}
      </div>
      <div class="team-block team-away">${z.host}</div>
    </div>
  </div>`;
}

function renderZapasy() {
  const tim = document.getElementById('timFilter').value;
  let zap = DATA.zapasy.filter(z => {
    if(activeSkupina && z.skupina!==activeSkupina) return false;
    if(tim && z.domaci!==tim && z.host!==tim) return false;
    return true;
  });
  
  // Zoradenie podľa ID (najnovšie / najvyššie ID prvé pri odohratých, najnižšie ID pri nadchádzajúcich)
  const past = zap.filter(z=>z.goly_domaci!==''&&z.goly_host!=='')
                  .sort((a,b)=>parseInt(b.id) - parseInt(a.id));
  const upcoming = zap.filter(z=>z.goly_domaci===''||z.goly_host==='')
                      .sort((a,b)=>parseInt(a.id) - parseInt(b.id));

  let html = '';
  // Apply visual style from image only to upcoming, but logic for both
  if(upcoming.length) html += `<div class="section">
    <div class="section-title">NADCHÁDZAJÚCE <span class="badge">${upcoming.length}</span></div>
    ${upcoming.map(z=>matchCard(z,true)).join('')}
  </div>`;
  if(past.length) html += `<div class="section">
    <div class="section-title">ODOHRATÉ <span class="badge">${past.length}</span></div>
    ${past.map(z=>matchCard(z,false)).join('')}
  </div>`;

  document.getElementById('zapasy-content').innerHTML = html || '<div class="empty" style="z-index:2; position:relative;">Žiadne zápasy pre tento filter.</div>';
}

// ═══════════════════════════════════════
//  NAVIGÁCIA (Redesigned)
// ═══════════════════════════════════════
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('#footer-nav .footer-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
}

// ═══════════════════════════════════════
//  SERVICE WORKER
// ═══════════════════════════════════════
if('serviceWorker' in navigator){
  // Check if sw.js exists before registering to avoid error noise if user didn't upload it.
  fetch('./sw.js').then(response => {
    if (response.ok) {
       navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  }).catch(()=>{});
}

loadAll();
</script>
