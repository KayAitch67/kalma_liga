<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0D0D0F"/>
  <title>Kalma Liga</title>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0D0D0F;--surface:#161618;--surface2:#1E1E22;--surface3:#252528;--orange:#E06B2A;--green:#3DAF6E;--text:#FFFFFF;--muted:#55556A;--border:#252528;--win:#3DAF6E;--draw:#E0A02A;--loss:#E04040;--r:12px;--fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:var(--fb);background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{background:var(--surface);padding:16px 18px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border);}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-text{font-family:var(--fh);font-size:22px;font-weight:900;line-height:1;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
    .logo-text span{display:block;}
    .donut-wrap{position:relative;width:52px;height:52px;flex-shrink:0;}
    .donut-wrap svg{transform:rotate(-90deg);}
    .donut-track{fill:none;stroke:var(--surface3);stroke-width:4;}
    .donut-fill{fill:none;stroke:var(--orange);stroke-width:4;stroke-linecap:round;transition:stroke-dasharray .6s ease;}
    .donut-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--fh);line-height:1.15;}
    .donut-top{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .donut-num{font-size:13px;font-weight:900;color:var(--orange);}
    .filter-wrap{background:var(--surface);padding:10px 18px 14px;flex-shrink:0;border-bottom:1px solid var(--border);}
    .chip-row{display:flex;gap:8px;margin-bottom:10px;}
    .chip{padding:7px 16px;border-radius:8px;border:1.5px solid var(--muted);background:transparent;color:var(--muted);font-family:var(--fh);font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
    .chip.active-orange{background:var(--orange);color:#fff;border-color:var(--orange);}
    .chip.active-green{background:var(--green);color:#fff;border-color:var(--green);}
    .chip-skupinaA,.chip-skupinaB{border-color:var(--green);color:var(--green);}
    .dropdown-wrap{position:relative;}
    .filter-select{width:100%;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border);border-radius:8px;padding:10px 40px 10px 14px;font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
    .dropdown-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
    main{flex:1;overflow-y:auto;padding:16px 18px;padding-bottom:90px;}
    .page{display:none;}
    .page.active{display:block;}
    .section{margin-bottom:20px;}
    .section-title{font-family:var(--fh);font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--orange),transparent);border-radius:1px;}
    .cnt-badge{background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;order:-1;}
    .match-card{background:var(--surface);border-radius:var(--r);padding:10px 14px 12px;margin-bottom:8px;border:1px solid var(--border);}
    .match-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .match-num{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .match-score-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .match-grp{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--green);}
    .match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
    .match-team{font-family:var(--fh);font-size:17px;font-weight:800;line-height:1.1;letter-spacing:.5px;}
    .match-team.home{text-align:right;}
    .match-team.away{text-align:left;}
    .score-box{background:var(--surface2);border-radius:8px;min-width:62px;padding:6px 10px;text-align:center;font-family:var(--fh);font-size:22px;font-weight:900;letter-spacing:2px;border:1px solid var(--border);}
    .score-box.upcoming{color:var(--muted);font-size:16px;letter-spacing:1px;}
    .standings-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-bottom:8px;}
    .standings-table{width:100%;border-collapse:collapse;font-size:13px;}
    .standings-table th{font-family:var(--fh);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 5px;text-align:center;background:var(--surface2);border-bottom:1px solid var(--border);}
    .standings-table th:first-child{text-align:left;padding-left:12px;}
    .standings-table td{padding:10px 5px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);font-size:13px;}
    .standings-table td:first-child{text-align:left;padding-left:12px;font-weight:600;}
    .standings-table tr:last-child td{border-bottom:none;}
    .standings-table tr.playoff-row td{background:rgba(61,175,110,0.07);}
    .standings-table tr.noplf-row td{background:rgba(224,64,64,0.05);}
    .playoff-sep td{padding:0!important;height:2px;background:linear-gradient(90deg,var(--green),transparent)!important;border:none!important;}
    .rank-num{color:var(--muted);font-size:11px;margin-right:4px;}
    .pts-cell{font-weight:900;color:var(--orange);}
    .playoff-legend{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
    .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .playoff-empty{text-align:center;padding:80px 20px;color:var(--muted);}
    .playoff-empty .trophy{font-size:60px;display:block;margin-bottom:16px;opacity:.3;}
    .playoff-empty h2{font-family:var(--fh);font-size:28px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--surface3);margin-bottom:8px;}
    .playoff-empty p{font-size:13px;line-height:1.6;}
    .vykony-select-wrap{margin-bottom:20px;}
    .vykony-select-wrap label{display:block;font-family:var(--fh);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .vykony-select-wrap select{width:100%;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:var(--fh);font-size:16px;font-weight:700;cursor:pointer;outline:none;appearance:none;}
    .vykony-select-wrap select:focus{border-color:var(--orange);}
    .combined-card{background:linear-gradient(135deg,#1E1408,var(--surface));border-radius:var(--r);border:1px solid var(--orange);padding:20px;margin-bottom:14px;text-align:center;}
    .combined-title{font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .coeff-value{font-family:var(--fh);font-size:56px;font-weight:900;color:var(--orange);letter-spacing:2px;line-height:1;}
    .coeff-sub{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}
    .coeff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
    .coeff-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center;}
    .coeff-item-val{font-family:var(--fh);font-size:24px;font-weight:900;color:var(--green);}
    .coeff-item-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
    .team-stat-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:14px;}
    .team-stat-header{background:var(--surface2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
    .team-stat-name{font-family:var(--fh);font-size:20px;font-weight:900;letter-spacing:1px;}
    .team-rank-badge{font-family:var(--fh);font-size:13px;font-weight:800;background:var(--bg);border-radius:6px;padding:4px 10px;color:var(--orange);}
    .team-stat-body{padding:14px 16px;}
    .mini-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
    .mini-stat{background:var(--surface2);border-radius:8px;padding:10px 6px;text-align:center;}
    .mini-val{font-family:var(--fh);font-size:22px;font-weight:900;}
    .mini-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
    .ppg-line{text-align:center;color:var(--muted);font-size:12px;margin-top:2px;}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
    .nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;}
    .nav-btn::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--orange);border-radius:2px;transition:width .2s;}
    .nav-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:70px;height:40px;background:radial-gradient(ellipse at bottom,rgba(224,107,42,0.35) 0%,transparent 70%);opacity:0;transition:opacity .2s;pointer-events:none;}
    .nav-btn.active::before{width:40px;}
    .nav-btn.active .nav-glow{opacity:1;}
    .nav-icon{font-size:20px;line-height:1;color:var(--muted);transition:color .2s;}
    .nav-btn.active .nav-icon{color:var(--orange);}
    .nav-label{font-family:var(--fh);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:color .2s;}
    .nav-btn.active .nav-label{color:var(--orange);}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);gap:14px;}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
    .error-box{background:#1A0A0A;border:1px solid var(--loss);border-radius:var(--r);padding:16px;font-size:13px;color:#ff9999;line-height:1.7;}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <path d="M19 3L5 9V21C5 29 11 35 19 37C27 35 33 29 33 21V9L19 3Z" fill="#E06B2A" opacity=".12" stroke="#E06B2A" stroke-width="1.5"/>
        <path d="M13 16C13 16 15.5 13 19 13C22.5 13 25 16 25 16L22.5 19H15.5L13 16Z" fill="#E06B2A"/>
        <path d="M15.5 19L14 25H24L22.5 19H15.5Z" fill="#E06B2A" opacity=".65"/>
        <circle cx="16.5" cy="16" r="1.3" fill="#fff"/>
        <circle cx="21.5" cy="16" r="1.3" fill="#fff"/>
      </svg>
    </div>
    <div class="logo-text"><span>Kalma</span><span>Liga</span></div>
  </div>
  <div class="donut-wrap">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle class="donut-track" cx="26" cy="26" r="22"/>
      <circle class="donut-fill" id="donutFill" cx="26" cy="26" r="22" stroke-dasharray="0 138.2"/>
    </svg>
    <div class="donut-label">
      <span class="donut-top">Progres</span>
      <span class="donut-num" id="donutNum">–</span>
    </div>
  </div>
</header>

<div class="filter-wrap" id="filterWrap">
  <div class="chip-row">
    <div class="chip active-orange" id="chipAll" onclick="setSkupina('',this)">Všetky</div>
  </div>
  <div class="dropdown-wrap">
    <select class="filter-select" id="timFilter" onchange="renderZapasy()">
      <option value="">Všetky tímy</option>
    </select>
    <svg class="dropdown-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M3 5l4 4 4-4" stroke="#55556A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<main>
  <div class="page active" id="page-zapasy">
    <div id="zapasy-content"><div class="loader"><div class="spinner"></div>Načítavam…</div></div>
  </div>
  <div class="page" id="page-tabulka">
    <div class="playoff-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Postup do play-off (top 4)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--loss)"></div>Vypadávajúce</div>
    </div>
    <div id="tabulka-content"><div class="loader"><div class="spinner"></div>Načítavam…</div></div>
  </div>
  <div class="page" id="page-playoff">
    <div class="playoff-empty">
      <span class="trophy">🏆</span>
      <h2>Play-off</h2>
      <p>Táto sekcia sa aktivuje<br>po skončení skupinovej fázy.</p>
    </div>
  </div>
  <div class="page" id="page-vykony">
    <div class="vykony-select-wrap">
      <label>Vyber hráča</label>
      <select id="playerSelect" onchange="renderVykony()"><option value="">— Vyber meno —</option></select>
    </div>
    <div id="vykony-content"><div class="empty">Vyber hráča vyššie ↑</div></div>
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-btn active" onclick="showPage('zapasy',this)">
    <div class="nav-glow"></div>
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.8"/>
      <path d="M11 2C11 2 8 5 8 11s3 9 3 9M11 2c0 0 3 3 3 9s-3 9-3 9" stroke="currentColor" stroke-width="1.3"/>
      <path d="M2.5 8.5h17M2.5 13.5h17" stroke="currentColor" stroke-width="1.3"/>
    </svg>
    <span class="nav-label">Zápasy</span>
  </div>
  <div class="nav-btn" onclick="showPage('tabulka',this)">
    <div class="nav-glow"></div>
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="2" y="12" width="4" height="8" rx="1.5" fill="currentColor" opacity=".45"/>
      <rect x="9" y="8" width="4" height="12" rx="1.5" fill="currentColor" opacity=".7"/>
      <rect x="16" y="4" width="4" height="16" rx="1.5" fill="currentColor"/>
    </svg>
    <span class="nav-label">Poradie</span>
  </div>
  <div class="nav-btn" onclick="showPage('playoff',this)">
    <div class="nav-glow"></div>
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M11 2l2.5 5 5.5.8-4 3.9.9 5.5L11 14.5 6.1 17.2l.9-5.5L3 7.8 8.5 7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    </svg>
    <span class="nav-label">Play-off</span>
  </div>
  <div class="nav-btn" onclick="showPage('vykony',this)">
    <div class="nav-glow"></div>
    <svg class="nav-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M3 17l4.5-5 4 3 4-6 3.5 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="6" r="3" stroke="currentColor" stroke-width="1.6"/>
    </svg>
    <span class="nav-label">Výkony</span>
  </div>
</nav>

<script>
const CSV_URLS={tymy:'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=0&single=true&output=csv',zapasy:'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=441403134&single=true&output=csv',hraci:'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=1788671607&single=true&output=csv'};
const PLAYOFF_SPOTS=4;
let DATA={tymy:[],zapasy:[],hraci:[]};
let activeSkupina='';

function parseLine(line){const vals=[];let cur='',inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur);cur='';}else{cur+=ch;}}vals.push(cur);return vals.map(v=>v.trim().replace(/^"|"$/g,''));}
function parseCSV(text){const lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];const headers=parseLine(lines[0]);return lines.slice(1).map(line=>{const vals=parseLine(line);const obj={};headers.forEach((h,i)=>obj[h]=vals[i]??'');return obj;}).filter(row=>Object.values(row).some(v=>v!==''));}

async function fetchCSV(url){
  try{const res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error();const text=await res.text();if(text.trim().startsWith('<'))throw new Error();return parseCSV(text);}catch(_){}
  const res2=await fetch('https://corsproxy.io/?'+encodeURIComponent(url),{cache:'no-store'});
  const text2=await res2.text();if(text2.trim().startsWith('<'))throw new Error('Proxy vrátila HTML');
  return parseCSV(text2);
}

async function loadAll(){
  try{
    const[tymy,zapasy,hraci]=await Promise.all([fetchCSV(CSV_URLS.tymy),fetchCSV(CSV_URLS.zapasy),fetchCSV(CSV_URLS.hraci)]);
    DATA={tymy,zapasy,hraci};
    buildSkupinaChips();buildTimFilter();buildPlayerSelect();updateDonut();renderZapasy();renderTabulka();
  }catch(err){
    const msg=`<div class="error-box">❌ <strong>Chyba pri načítaní dát</strong><br><br>${err.message}<br><br>• Skontroluj publikovanie Sheets<br>• Každú záložku zvlášť ako CSV</div>`;
    document.getElementById('zapasy-content').innerHTML=msg;
    document.getElementById('tabulka-content').innerHTML=msg;
  }
}

function updateDonut(){
  const total=DATA.zapasy.length;
  const done=DATA.zapasy.filter(z=>z.goly_domaci!==''&&z.goly_host!=='').length;
  const circ=2*Math.PI*22;
  const dash=total>0?(done/total)*circ:0;
  document.getElementById('donutFill').setAttribute('stroke-dasharray',`${dash} ${circ}`);
  document.getElementById('donutNum').textContent=`${done}/${total}`;
}

function buildSkupinaChips(){
  const skupiny=[...new Set(DATA.tymy.map(t=>t.skupina))].sort();
  const row=document.querySelector('.chip-row');
  row.querySelectorAll('.chip:not(#chipAll)').forEach(c=>c.remove());
  skupiny.forEach(s=>{
    const ch=document.createElement('div');
    ch.className='chip chip-skupina'+s.replace(/\s/g,'');
    ch.textContent='Skupina '+s;
    ch.onclick=()=>setSkupina(s,ch);
    row.appendChild(ch);
  });
}

function setSkupina(s,el){
  activeSkupina=s;
  document.querySelectorAll('.chip-row .chip').forEach(c=>c.classList.remove('active-orange','active-green'));
  el.classList.add(s===''?'active-orange':'active-green');
  buildTimFilter();renderZapasy();
}

function buildTimFilter(){
  const sel=document.getElementById('timFilter');
  const prev=sel.value;
  sel.innerHTML='<option value="">Všetky tímy</option>';
  const tymy=activeSkupina?DATA.tymy.filter(t=>t.skupina===activeSkupina):DATA.tymy;
  tymy.forEach(t=>{const o=document.createElement('option');o.value=t.nazov;o.textContent=t.nazov;sel.appendChild(o);});
  if([...sel.options].some(o=>o.value===prev))sel.value=prev;
}

function matchCard(z,isUp,idx){
  return`<div class="match-card">
    <div class="match-meta">
      <span class="match-num">Zápas #${z.id||idx+1}</span>
      <span class="match-score-label">Výsledné skóre</span>
      <span class="match-grp">Skupina ${z.skupina}</span>
    </div>
    <div class="match-teams">
      <div class="match-team home">${z.domaci}</div>
      ${isUp?`<div class="score-box upcoming">: </div>`:`<div class="score-box">${z.goly_domaci} : ${z.goly_host}</div>`}
      <div class="match-team away">${z.host}</div>
    </div>
  </div>`;
}

function renderZapasy(){
  const tim=document.getElementById('timFilter').value;
  let zap=DATA.zapasy.filter(z=>{
    if(activeSkupina&&z.skupina!==activeSkupina)return false;
    if(tim&&z.domaci!==tim&&z.host!==tim)return false;
    return true;
  });
  const past=zap.filter(z=>z.goly_domaci!==''&&z.goly_host!=='').sort((a,b)=>parseInt(b.id)-parseInt(a.id));
  const upcoming=zap.filter(z=>z.goly_domaci===''||z.goly_host==='').sort((a,b)=>parseInt(a.id)-parseInt(b.id));
  let html='';
  if(upcoming.length)html+=`<div class="section"><div class="section-title"><span class="cnt-badge">${upcoming.length}</span>Nadchádzajúce</div>${upcoming.map((z,i)=>matchCard(z,true,i)).join('')}</div>`;
  if(past.length)html+=`<div class="section"><div class="section-title"><span class="cnt-badge">${past.length}</span>Odohráté</div>${past.map((z,i)=>matchCard(z,false,i)).join('')}</div>`;
  document.getElementById('zapasy-content').innerHTML=html||'<div class="empty">Žiadne zápasy pre tento filter.</div>';
}

function calcStandings(skupina){
  const teams=DATA.tymy.filter(t=>t.skupina===skupina).map(t=>t.nazov);
  const st={};
  teams.forEach(t=>{st[t]={t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  DATA.zapasy.filter(z=>z.skupina===skupina&&z.goly_domaci!==''&&z.goly_host!=='').forEach(z=>{
    const gd=parseInt(z.goly_domaci),gh=parseInt(z.goly_host);
    if(isNaN(gd)||isNaN(gh))return;
    if(!st[z.domaci]||!st[z.host])return;
    st[z.domaci].p++;st[z.domaci].gf+=gd;st[z.domaci].ga+=gh;
    st[z.host].p++;st[z.host].gf+=gh;st[z.host].ga+=gd;
    if(gd>gh){st[z.domaci].w++;st[z.domaci].pts+=3;st[z.host].l++;}
    else if(gd<gh){st[z.host].w++;st[z.host].pts+=3;st[z.domaci].l++;}
    else{st[z.domaci].d++;st[z.domaci].pts++;st[z.host].d++;st[z.host].pts++;}
  });
  return Object.values(st).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

function renderTabulka(){
  const skupiny=[...new Set(DATA.tymy.map(t=>t.skupina))].sort();
  if(!skupiny.length){document.getElementById('tabulka-content').innerHTML='<div class="empty">Žiadne dáta.</div>';return;}
  const html=skupiny.map(s=>{
    const rows=calcStandings(s);
    const trs=rows.map((r,i)=>{
      const rank=i+1,cls=rank<=PLAYOFF_SPOTS?'playoff-row':'noplf-row',gd=r.gf-r.ga;
      const sep=rank===PLAYOFF_SPOTS&&rows.length>PLAYOFF_SPOTS?`<tr class="playoff-sep"><td colspan="8"></td></tr>`:'';
      return`<tr class="${cls}"><td><span class="rank-num">${rank}.</span>${r.t}</td><td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}:${r.ga}</td><td>${gd>0?'+':''}${gd}</td><td class="pts-cell">${r.pts}</td></tr>${sep}`;
    }).join('');
    return`<div class="section"><div class="section-title">Skupina ${s}</div><div class="standings-wrap"><table class="standings-table"><thead><tr><th>Tím</th><th>Z</th><th>V</th><th>R</th><th>P</th><th>GS</th><th>±</th><th>B</th></tr></thead><tbody>${trs}</tbody></table></div></div>`;
  }).join('');
  document.getElementById('tabulka-content').innerHTML=html;
}

function buildPlayerSelect(){
  const sel=document.getElementById('playerSelect');
  DATA.hraci.forEach(h=>{
    if(!h.meno)return;
    const o=document.createElement('option');o.value=h.meno;o.textContent=h.meno;sel.appendChild(o);
  });
}

function renderVykony(){
  const player=document.getElementById('playerSelect').value;
  const el=document.getElementById('vykony-content');
  if(!player){el.innerHTML='<div class="empty">Vyber hráča vyššie ↑</div>';return;}
  const myTeams=DATA.tymy.filter(t=>t.hrac===player);
  if(!myTeams.length){el.innerHTML='<div class="empty">Hráč nemá priradené tímy.</div>';return;}
  function teamSt(name){
    const s={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    DATA.zapasy.filter(z=>(z.domaci===name||z.host===name)&&z.goly_domaci!==''&&z.goly_host!=='').forEach(z=>{
      const gd=parseInt(z.goly_domaci),gh=parseInt(z.goly_host);if(isNaN(gd)||isNaN(gh))return;
      const isH=z.domaci===name,mg=isH?gd:gh,og=isH?gh:gd;
      s.p++;s.gf+=mg;s.ga+=og;if(mg>og){s.w++;s.pts+=3;}else if(mg===og){s.d++;s.pts++;}else s.l++;
    });return s;
  }
  function getRank(name,skupina){return calcStandings(skupina).findIndex(r=>r.t===name)+1;}
  let totalPts=0,totalP=0,ppgArr=[];
  const teamCards=myTeams.map(t=>{
    const s=teamSt(t.nazov),rank=getRank(t.nazov,t.skupina);
    const timPpg=s.p>0?s.pts/s.p:null;if(timPpg!==null)ppgArr.push(timPpg);
    totalPts+=s.pts;totalP+=s.p;const ppgStr=s.p>0?(s.pts/s.p).toFixed(2):'–';
    return`<div class="team-stat-card"><div class="team-stat-header"><div class="team-stat-name">${t.nazov}</div><div class="team-rank-badge">${rank}. miesto · Sk. ${t.skupina}</div></div><div class="team-stat-body"><div class="mini-stat-grid"><div class="mini-stat"><div class="mini-val" style="color:var(--win)">${s.w}</div><div class="mini-label">Výhry</div></div><div class="mini-stat"><div class="mini-val" style="color:var(--draw)">${s.d}</div><div class="mini-label">Remízy</div></div><div class="mini-stat"><div class="mini-val" style="color:var(--loss)">${s.l}</div><div class="mini-label">Prehry</div></div><div class="mini-stat"><div class="mini-val">${s.gf}</div><div class="mini-label">Dané g.</div></div><div class="mini-stat"><div class="mini-val">${s.ga}</div><div class="mini-label">Inkasov.</div></div><div class="mini-stat"><div class="mini-val">${s.pts}</div><div class="mini-label">Body</div></div></div><div class="ppg-line">Priem. body / zápas: <strong style="color:var(--green)">${ppgStr}</strong></div></div></div>`;
  }).join('');
  const combinedPpg=ppgArr.length>0?ppgArr.reduce((a,b)=>a+b,0)/ppgArr.length:null;
  const coeff=combinedPpg!==null?((combinedPpg/3)*10).toFixed(1):'–';
  const overallPpg=totalP>0?(totalPts/totalP).toFixed(2):'–';
  el.innerHTML=`<div class="combined-card"><div class="combined-title">Sila hráča · koeficient</div><div class="coeff-value">${coeff}<span style="font-size:24px;color:var(--muted)">/10</span></div><div class="coeff-sub">Priemerné body/zápas oboch tímov, škálované 0–10</div><div class="coeff-grid"><div class="coeff-item"><div class="coeff-item-val">${overallPpg}</div><div class="coeff-item-label">Celk. body/zápas</div></div><div class="coeff-item"><div class="coeff-item-val">${totalPts}</div><div class="coeff-item-label">Celkové body</div></div></div></div>${teamCards}`;
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  document.getElementById('filterWrap').style.display=id==='zapasy'?'block':'none';
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
loadAll();
</script>
