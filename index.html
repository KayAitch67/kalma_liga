<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0f0f1a"/>
  <title>Liga</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --surface2: #23233d;
      --accent:   #e8c840;
      --accent2:  #4e9af1;
      --text:     #f0f0f0;
      --muted:    #7777a0;
      --border:   #2a2a45;
      --win:      #2ecc71;
      --draw:     #f39c12;
      --loss:     #e74c3c;
      --r:        12px;
      --fh:       'Barlow Condensed', sans-serif;
      --fb:       'Barlow', sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--fb);
      background:var(--bg);color:var(--text);
      max-width:480px;margin:0 auto;
      min-height:100vh;display:flex;flex-direction:column;
    }

    /* HEADER */
    header{
      background:var(--surface);padding:16px 16px 0;
      border-bottom:2px solid var(--accent);
      position:sticky;top:0;z-index:100;flex-shrink:0;
    }
    .header-title{
      font-family:var(--fh);font-size:26px;font-weight:900;
      letter-spacing:3px;text-transform:uppercase;
      color:var(--accent);margin-bottom:10px;
    }
    .tabs{display:flex;gap:2px;}
    .tab{
      flex:1;padding:10px 2px;text-align:center;
      font-family:var(--fh);font-size:12px;font-weight:700;
      letter-spacing:.5px;text-transform:uppercase;
      color:var(--muted);cursor:pointer;
      border-bottom:3px solid transparent;transition:all .2s;
      white-space:nowrap;
    }
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

    /* MAIN */
    main{flex:1;overflow-y:auto;padding:16px;}
    .page{display:none;}
    .page.active{display:block;}

    /* FILTER BAR */
    .filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
    .chip-group{display:flex;gap:4px;flex-shrink:0;}
    .chip{
      padding:6px 12px;border-radius:20px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--muted);font-family:var(--fh);font-size:13px;font-weight:700;
      letter-spacing:.5px;cursor:pointer;transition:all .18s;white-space:nowrap;
    }
    .chip.active{background:var(--accent);color:#000;border-color:var(--accent);}
    .filter-select{
      flex:1;min-width:0;background:var(--surface);color:var(--text);
      border:1px solid var(--border);border-radius:20px;
      padding:6px 12px;font-family:var(--fb);font-size:13px;
      cursor:pointer;outline:none;
    }
    .filter-select:focus{border-color:var(--accent);}

    /* SECTION */
    .section{margin-bottom:24px;}
    .section-title{
      font-family:var(--fh);font-size:17px;font-weight:800;
      letter-spacing:2px;text-transform:uppercase;
      color:var(--muted);margin-bottom:10px;
      padding-bottom:6px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;
    }
    .badge{
      background:var(--surface2);color:var(--accent2);
      font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;
    }

    /* MATCH CARD */
    .match-card{
      background:var(--surface);border-radius:var(--r);
      padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);
    }
    .match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .match-date{font-size:12px;color:var(--muted);}
    .grp-badge{
      font-family:var(--fh);font-size:11px;font-weight:700;
      letter-spacing:1px;text-transform:uppercase;
      background:var(--surface2);color:var(--accent2);
      padding:2px 8px;border-radius:10px;
    }
    .match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
    .match-team{font-family:var(--fh);font-size:16px;font-weight:700;line-height:1.15;}
    .match-team.home{text-align:right;}
    .match-team.away{text-align:left;}
    .score-box{
      font-family:var(--fh);font-size:22px;font-weight:900;
      text-align:center;background:var(--surface2);
      padding:4px 10px;border-radius:8px;min-width:58px;
    }
    .score-box.upcoming{
      font-size:14px;color:var(--muted);
      background:transparent;border:1px dashed var(--border);
    }

    /* STANDINGS */
    .standings-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
    .standings-table{width:100%;border-collapse:collapse;font-size:13px;}
    .standings-table th{
      font-family:var(--fh);font-size:11px;letter-spacing:1px;
      text-transform:uppercase;color:var(--muted);
      padding:8px 6px;text-align:center;
      background:var(--surface2);border-bottom:1px solid var(--border);
    }
    .standings-table th:first-child{text-align:left;padding-left:12px;}
    .standings-table td{
      padding:10px 6px;text-align:center;
      border-bottom:1px solid var(--border);background:var(--surface);
    }
    .standings-table td:first-child{text-align:left;padding-left:12px;font-weight:600;}
    .standings-table tr:last-child td{border-bottom:none;}
    .standings-table tr.playoff-row td{background:rgba(78,154,241,0.08);}
    .standings-table tr.noplf-row td{background:rgba(231,76,60,0.06);}
    .playoff-sep td{
      padding:0!important;height:3px;
      background:linear-gradient(90deg,var(--accent2),transparent)!important;
      border:none!important;
    }
    .rank-num{color:var(--muted);font-size:12px;margin-right:4px;}
    .pts-cell{font-weight:800;color:var(--accent);}

    .playoff-legend{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

    /* PLAY-OFF */
    .playoff-empty{text-align:center;padding:60px 20px;color:var(--muted);}
    .playoff-empty .big{
      font-family:var(--fh);font-size:52px;font-weight:900;
      letter-spacing:4px;color:var(--border);display:block;margin-bottom:12px;
    }

    /* VÝKONY */
    .player-select-wrap{margin-bottom:20px;}
    .player-select-wrap label{
      display:block;font-family:var(--fh);font-size:13px;
      letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;
    }
    .player-select-wrap select{
      width:100%;background:var(--surface);color:var(--text);
      border:1px solid var(--border);border-radius:var(--r);
      padding:10px 14px;font-family:var(--fb);font-size:15px;cursor:pointer;outline:none;
    }
    .player-select-wrap select:focus{border-color:var(--accent);}

    .combined-card{
      background:linear-gradient(135deg,var(--surface2),var(--surface));
      border-radius:var(--r);border:1px solid var(--accent);
      padding:20px;margin-bottom:16px;text-align:center;
    }
    .combined-title{
      font-family:var(--fh);font-size:13px;font-weight:700;
      letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;
    }
    .coeff-value{
      font-family:var(--fh);font-size:52px;font-weight:900;
      color:var(--accent);letter-spacing:2px;line-height:1;
    }
    .coeff-sub{font-size:12px;color:var(--muted);margin-top:6px;}
    .coeff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
    .coeff-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center;}
    .coeff-item-val{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--accent2);}
    .coeff-item-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

    .team-stat-card{
      background:var(--surface);border-radius:var(--r);
      border:1px solid var(--border);overflow:hidden;margin-bottom:16px;
    }
    .team-stat-header{
      background:var(--surface2);padding:12px 16px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .team-stat-name{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:1px;}
    .team-rank-badge{
      font-family:var(--fh);font-size:14px;font-weight:700;
      background:var(--bg);border-radius:8px;padding:4px 10px;color:var(--accent);
    }
    .team-stat-body{padding:14px 16px;}
    .mini-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
    .mini-stat{background:var(--surface2);border-radius:10px;padding:10px 8px;text-align:center;}
    .mini-val{font-family:var(--fh);font-size:22px;font-weight:800;}
    .mini-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
    .ppg-line{text-align:center;color:var(--muted);font-size:13px;margin-top:4px;}

    /* LOADER */
    .loader{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:60px 20px;color:var(--muted);gap:14px;
    }
    .spinner{
      width:30px;height:30px;border:3px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;color:var(--muted);padding:30px;font-size:14px;}
    .error-box{
      background:#2a0a0a;border:1px solid var(--loss);border-radius:var(--r);
      padding:16px;margin-bottom:16px;font-size:13px;color:#ff9999;line-height:1.6;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">⚽ Liga</div>
  <div class="tabs">
    <div class="tab active" onclick="showPage('zapasy',this)">Zápasy</div>
    <div class="tab" onclick="showPage('tabulka',this)">Tabuľka</div>
    <div class="tab" onclick="showPage('playoff',this)">Play-off</div>
    <div class="tab" onclick="showPage('vykony',this)">Výkony</div>
  </div>
</header>

<main>

  <!-- ══ 1. ZÁPASY ══ -->
  <div class="page active" id="page-zapasy">
    <div class="filter-bar">
      <div class="chip-group" id="skupinaChips">
        <div class="chip active" onclick="setSkupina('',this)">Všetky</div>
      </div>
      <select class="filter-select" id="timFilter" onchange="renderZapasy()">
        <option value="">Všetky tímy</option>
      </select>
    </div>
    <div id="zapasy-content">
      <div class="loader"><div class="spinner"></div>Načítavam…</div>
    </div>
  </div>

  <!-- ══ 2. TABUĽKA ══ -->
  <div class="page" id="page-tabulka">
    <div class="playoff-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--accent2)"></div>
        Postup do play-off (top 4)
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--loss)"></div>
        Vypadávajúce miesta
      </div>
    </div>
    <div id="tabulka-content">
      <div class="loader"><div class="spinner"></div>Načítavam…</div>
    </div>
  </div>

  <!-- ══ 3. PLAY-OFF ══ -->
  <div class="page" id="page-playoff">
    <div class="playoff-empty">
      <span class="big">🏆</span>
      Play-off zatiaľ nie je k dispozícii.
      <div style="margin-top:12px;font-size:13px;line-height:1.6;">
        Táto sekcia sa aktivuje<br>po skončení skupinovej fázy.
      </div>
    </div>
  </div>

  <!-- ══ 4. VÝKONY ══ -->
  <div class="page" id="page-vykony">
    <div class="player-select-wrap">
      <label>Vyber hráča</label>
      <select id="playerSelect" onchange="renderVykony()">
        <option value="">— Vyber meno —</option>
      </select>
    </div>
    <div id="vykony-content">
      <div class="empty">Vyber hráča vyššie ↑</div>
    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════
//  KONFIGURÁCIA
// ═══════════════════════════════════════
const CSV_URLS = {
  tymy:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=0&single=true&output=csv',
  zapasy: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=441403134&single=true&output=csv',
  hraci:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9rgfWoC7l6Zj8cqUjXY4mPCqszTV7sIPQ7wN0M_CD41Oy11nk7IOd4MqyAxn9z__5ZxS5XgLsNd0/pub?gid=1788671607&single=true&output=csv',
};
const PLAYOFF_SPOTS = 4;

// ═══════════════════════════════════════
//  STAV
// ═══════════════════════════════════════
let DATA = { tymy:[], zapasy:[], hraci:[] };
let activeSkupina = '';

// ═══════════════════════════════════════
//  CSV PARSING
// ═══════════════════════════════════════
function parseLine(line) {
  const vals=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){vals.push(cur);cur='';}
    else{cur+=ch;}
  }
  vals.push(cur);
  return vals.map(v=>v.trim().replace(/^"|"$/g,''));
}
function parseCSV(text) {
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const headers=parseLine(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseLine(line);
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]??'');
    return obj;
  }).filter(row=>Object.values(row).some(v=>v!==''));
}

// ═══════════════════════════════════════
//  FETCH + CORS FALLBACK
// ═══════════════════════════════════════
async function fetchCSV(url) {
  // Pokus 1: priamy fetch
  try {
    const res = await fetch(url, {cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if(text.trim().startsWith('<')) throw new Error('Vrátilo HTML – nie CSV');
    return parseCSV(text);
  } catch(_) {}

  // Pokus 2: CORS proxy
  const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
  const res2 = await fetch(proxy, {cache:'no-store'});
  if(!res2.ok) throw new Error(`Proxy zlyhala (HTTP ${res2.status})`);
  const text2 = await res2.text();
  if(text2.trim().startsWith('<')) throw new Error('Proxy vrátila HTML – skontroluj publikovanie Sheets');
  return parseCSV(text2);
}

// ═══════════════════════════════════════
//  LOAD ALL
// ═══════════════════════════════════════
async function loadAll() {
  try {
    const [tymy, zapasy, hraci] = await Promise.all([
      fetchCSV(CSV_URLS.tymy),
      fetchCSV(CSV_URLS.zapasy),
      fetchCSV(CSV_URLS.hraci),
    ]);
    DATA = {tymy, zapasy, hraci};
    buildSkupinaChips();
    buildTimFilter();
    buildPlayerSelect();
    renderZapasy();
    renderTabulka();
  } catch(err) {
    const msg = `<div class="error-box">
      ❌ <strong>Chyba pri načítaní dát</strong><br><br>
      ${err.message}<br><br>
      <strong>Skontroluj:</strong><br>
      • Súbor → Zdieľať → Publikovať na webe → každú záložku zvlášť ako CSV<br>
      • Spreadsheet musí byť nastavený na "Ktokoľvek s odkazom"
    </div>`;
    document.getElementById('zapasy-content').innerHTML = msg;
    document.getElementById('tabulka-content').innerHTML = msg;
  }
}

// ═══════════════════════════════════════
//  SKUPINA CHIPS
// ═══════════════════════════════════════
function buildSkupinaChips() {
  const skupiny = [...new Set(DATA.tymy.map(t=>t.skupina))].sort();
  const wrap = document.getElementById('skupinaChips');
  skupiny.forEach(s => {
    const ch = document.createElement('div');
    ch.className = 'chip';
    ch.textContent = 'Sk. ' + s;
    ch.onclick = () => setSkupina(s, ch);
    wrap.appendChild(ch);
  });
}
function setSkupina(s, el) {
  activeSkupina = s;
  document.querySelectorAll('#skupinaChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  buildTimFilter();
  renderZapasy();
}

// ═══════════════════════════════════════
//  TÍM FILTER
// ═══════════════════════════════════════
function buildTimFilter() {
  const sel = document.getElementById('timFilter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">Všetky tímy</option>';
  const tymy = activeSkupina ? DATA.tymy.filter(t=>t.skupina===activeSkupina) : DATA.tymy;
  tymy.forEach(t => {
    const o = document.createElement('option');
    o.value = t.nazov; o.textContent = t.nazov;
    sel.appendChild(o);
  });
  if([...sel.options].some(o=>o.value===prev)) sel.value = prev;
}

// ═══════════════════════════════════════
//  RENDER – ZÁPASY
// ═══════════════════════════════════════
function formatDate(d) {
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('sk-SK',{day:'numeric',month:'short',year:'numeric'});
}
function matchCard(z, isUp) {
  return `<div class="match-card">
    <div class="match-meta">
      <span class="match-date">${formatDate(z.datum)}</span>
      <span class="grp-badge">Sk. ${z.skupina}</span>
    </div>
    <div class="match-teams">
      <div class="match-team home">${z.domaci}</div>
      ${isUp
        ? `<div class="score-box upcoming">vs</div>`
        : `<div class="score-box">${z.goly_domaci} : ${z.goly_host}</div>`}
      <div class="match-team away">${z.host}</div>
    </div>
  </div>`;
}
function renderZapasy() {
  const tim = document.getElementById('timFilter').value;
  let zap = DATA.zapasy.filter(z => {
    if(activeSkupina && z.skupina!==activeSkupina) return false;
    if(tim && z.domaci!==tim && z.host!==tim) return false;
    return true;
  });
  const past = zap.filter(z=>z.goly_domaci!==''&&z.goly_host!=='').sort((a,b)=>new Date(b.datum)-new Date(a.datum));
  const upcoming = zap.filter(z=>z.goly_domaci===''||z.goly_host==='').sort((a,b)=>new Date(a.datum)-new Date(b.datum));

  let html = '';
  if(upcoming.length) html += `<div class="section">
    <div class="section-title">Nadchádzajúce <span class="badge">${upcoming.length}</span></div>
    ${upcoming.map(z=>matchCard(z,true)).join('')}
  </div>`;
  if(past.length) html += `<div class="section">
    <div class="section-title">Odohráté <span class="badge">${past.length}</span></div>
    ${past.map(z=>matchCard(z,false)).join('')}
  </div>`;

  document.getElementById('zapasy-content').innerHTML = html || '<div class="empty">Žiadne zápasy pre tento filter.</div>';
}

// ═══════════════════════════════════════
//  STANDINGS VÝPOČET
// ═══════════════════════════════════════
function calcStandings(skupina) {
  const teams = DATA.tymy.filter(t=>t.skupina===skupina).map(t=>t.nazov);
  const st = {};
  teams.forEach(t=>{st[t]={t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  DATA.zapasy
    .filter(z=>z.skupina===skupina&&z.goly_domaci!==''&&z.goly_host!=='')
    .forEach(z=>{
      const gd=parseInt(z.goly_domaci),gh=parseInt(z.goly_host);
      if(isNaN(gd)||isNaN(gh)) return;
      if(!st[z.domaci]||!st[z.host]) return;
      st[z.domaci].p++;st[z.domaci].gf+=gd;st[z.domaci].ga+=gh;
      st[z.host].p++;st[z.host].gf+=gh;st[z.host].ga+=gd;
      if(gd>gh){st[z.domaci].w++;st[z.domaci].pts+=3;st[z.host].l++;}
      else if(gd<gh){st[z.host].w++;st[z.host].pts+=3;st[z.domaci].l++;}
      else{st[z.domaci].d++;st[z.domaci].pts++;st[z.host].d++;st[z.host].pts++;}
    });
  return Object.values(st).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

// ═══════════════════════════════════════
//  RENDER – TABUĽKA
// ═══════════════════════════════════════
function renderTabulka() {
  const skupiny = [...new Set(DATA.tymy.map(t=>t.skupina))].sort();
  if(!skupiny.length){document.getElementById('tabulka-content').innerHTML='<div class="empty">Žiadne dáta.</div>';return;}

  const html = skupiny.map(s => {
    const rows = calcStandings(s);
    const trs = rows.map((r,i) => {
      const rank=i+1;
      const cls = rank<=PLAYOFF_SPOTS ? 'playoff-row' : 'noplf-row';
      const gd = r.gf-r.ga;
      const sep = rank===PLAYOFF_SPOTS && rows.length>PLAYOFF_SPOTS
        ? `<tr class="playoff-sep"><td colspan="8"></td></tr>` : '';
      return `<tr class="${cls}">
        <td><span class="rank-num">${rank}.</span>${r.t}</td>
        <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gf}:${r.ga}</td>
        <td>${gd>0?'+':''}${gd}</td>
        <td class="pts-cell">${r.pts}</td>
      </tr>${sep}`;
    }).join('');
    return `<div class="section">
      <div class="section-title">Skupina <span style="color:var(--accent2)">${s}</span></div>
      <div class="standings-wrap">
        <table class="standings-table">
          <thead><tr>
            <th>Tím</th><th>Z</th><th>V</th><th>R</th><th>P</th>
            <th>GS</th><th>±</th><th>B</th>
          </tr></thead>
          <tbody>${trs}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tabulka-content').innerHTML = html;
}

// ═══════════════════════════════════════
//  PLAYER SELECT
// ═══════════════════════════════════════
function buildPlayerSelect() {
  const sel = document.getElementById('playerSelect');
  DATA.hraci.forEach(h=>{
    const o=document.createElement('option');
    o.value=h.meno;o.textContent=h.meno;sel.appendChild(o);
  });
}

// ═══════════════════════════════════════
//  RENDER – MOJE VÝKONY
// ═══════════════════════════════════════
function renderVykony() {
  const player = document.getElementById('playerSelect').value;
  const el = document.getElementById('vykony-content');
  if(!player){el.innerHTML='<div class="empty">Vyber hráča vyššie ↑</div>';return;}

  const myTeams = DATA.tymy.filter(t=>t.hrac===player);
  if(!myTeams.length){el.innerHTML='<div class="empty">Hráč nemá priradené tímy.</div>';return;}

  function teamSt(name) {
    const s={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    DATA.zapasy.filter(z=>(z.domaci===name||z.host===name)&&z.goly_domaci!==''&&z.goly_host!=='').forEach(z=>{
      const gd=parseInt(z.goly_domaci),gh=parseInt(z.goly_host);
      if(isNaN(gd)||isNaN(gh)) return;
      const isH=z.domaci===name;
      const mg=isH?gd:gh,og=isH?gh:gd;
      s.p++;s.gf+=mg;s.ga+=og;
      if(mg>og){s.w++;s.pts+=3;}else if(mg===og){s.d++;s.pts++;}else s.l++;
    });
    return s;
  }
  function getRank(name,skupina){
    return calcStandings(skupina).findIndex(r=>r.t===name)+1;
  }

  let totalPts=0,totalP=0,ppgArr=[];

  const teamCards = myTeams.map(t=>{
    const s=teamSt(t.nazov);
    const rank=getRank(t.nazov,t.skupina);
    const timPpg=s.p>0?s.pts/s.p:null;
    if(timPpg!==null) ppgArr.push(timPpg);
    totalPts+=s.pts;totalP+=s.p;
    const ppgStr=s.p>0?(s.pts/s.p).toFixed(2):'–';
    return `<div class="team-stat-card">
      <div class="team-stat-header">
        <div class="team-stat-name">${t.nazov}</div>
        <div class="team-rank-badge">${rank}. miesto · Sk. ${t.skupina}</div>
      </div>
      <div class="team-stat-body">
        <div class="mini-stat-grid">
          <div class="mini-stat"><div class="mini-val" style="color:var(--win)">${s.w}</div><div class="mini-label">Výhry</div></div>
          <div class="mini-stat"><div class="mini-val" style="color:var(--draw)">${s.d}</div><div class="mini-label">Remízy</div></div>
          <div class="mini-stat"><div class="mini-val" style="color:var(--loss)">${s.l}</div><div class="mini-label">Prehry</div></div>
          <div class="mini-stat"><div class="mini-val">${s.gf}</div><div class="mini-label">Dané g.</div></div>
          <div class="mini-stat"><div class="mini-val">${s.ga}</div><div class="mini-label">Inkasov.</div></div>
          <div class="mini-stat"><div class="mini-val">${s.pts}</div><div class="mini-label">Body</div></div>
        </div>
        <div class="ppg-line">Priem. body / zápas: <strong style="color:var(--accent2)">${ppgStr}</strong></div>
      </div>
    </div>`;
  }).join('');

  const combinedPpg = ppgArr.length>0 ? ppgArr.reduce((a,b)=>a+b,0)/ppgArr.length : null;
  const coeff = combinedPpg!==null ? ((combinedPpg/3)*10).toFixed(1) : '–';
  const overallPpg = totalP>0 ? (totalPts/totalP).toFixed(2) : '–';

  el.innerHTML = `
    <div class="combined-card">
      <div class="combined-title">Sila hráča · koeficient</div>
      <div class="coeff-value">${coeff}<span style="font-size:24px;color:var(--muted)">/10</span></div>
      <div class="coeff-sub">Priemerné body/zápas oboch tímov, škálované 0–10</div>
      <div class="coeff-grid">
        <div class="coeff-item">
          <div class="coeff-item-val">${overallPpg}</div>
          <div class="coeff-item-label">Celk. body/zápas</div>
        </div>
        <div class="coeff-item">
          <div class="coeff-item-val">${totalPts}</div>
          <div class="coeff-item-label">Celkové body</div>
        </div>
      </div>
    </div>
    ${teamCards}`;
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
}
